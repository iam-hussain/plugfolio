name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build-time only; no real database is contacted (Prisma connects lazily at query time).
          DATABASE_URL: postgresql://user:pass@localhost:5432/plugfolio
          # Build-time placeholders; the real secrets are provided at runtime.
          DEVICE_TOKEN_SECRET: ci-build-placeholder-secret-not-used-at-runtime
          AUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plugfolio_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The shopper journey drives the real page → API → DB path (seeded @lena).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/plugfolio_e2e?schema=public
      DEVICE_TOKEN_SECRET: ci-e2e-secret-at-least-thirty-two-characters
      AUTH_SECRET: ci-e2e-auth-secret-at-least-thirty-two-chars
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm --filter @plugfolio/db db:migrate:deploy

      - name: Seed shopper journey data
        run: pnpm --filter @plugfolio/db db:seed

      - name: Install Playwright browsers
        run: pnpm --filter @plugfolio/web exec playwright install --with-deps chromium

      - name: Run e2e (shopper journeys)
        run: pnpm --filter @plugfolio/web test:e2e

  db-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plugfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/plugfolio_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/plugfolio_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply schema to test database
        run: pnpm --filter @plugfolio/db exec prisma db push --skip-generate

      - name: Integration tests (idempotency race)
        run: pnpm --filter @plugfolio/db test
