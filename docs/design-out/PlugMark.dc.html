<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style="display:block; overflow:visible;">
  <g stroke-linejoin="round">
    <polygon points="33,53 33,27 39.5,15 46,27 46,53" fill="{{ prong }}" stroke="{{ prong }}" stroke-width="3"></polygon>
    <polygon points="54,53 54,27 60.5,15 67,27 67,53" fill="{{ prong }}" stroke="{{ prong }}" stroke-width="3"></polygon>
    <rect x="18" y="43" width="64" height="44" rx="13" fill="{{ body }}" stroke="{{ body }}" stroke-width="3"></rect>
  </g>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 220, &quot;height&quot;: 220},
  &quot;body&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#7C3AED&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;prong&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#C6FF3D&quot;, &quot;tsType&quot;: &quot;string&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    return {
      body: this.props.body ?? '#7C3AED',
      prong: this.props.prong ?? '#C6FF3D',
    };
  }
}
</script>
</body>
</html>
